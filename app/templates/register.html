<!doctype html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Crear cuenta</title><link rel="stylesheet" href="{{ url_for('static', path='/styles.css') }}"></head>
<body class="auth-body"><main class="auth-card"><div class="brand-mark">FT</div><p class="eyebrow">NUEVA CUENTA</p>
<h1>Empieza a organizarte</h1>{% if error %}<div class="error">{{ error }}</div>{% endif %}
<form method="post" action="/register"><label>Nombre<input name="full_name" required></label>
<label>Correo<input type="email" name="email" required></label><label>Contraseña<input type="password" name="password" minlength="6" required></label>
<button>Crear cuenta</button></form><p class="switch-link">¿Ya tienes cuenta? <a href="/login">Inicia sesión</a></p></main></body></html>
